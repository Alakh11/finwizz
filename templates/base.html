<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>{% block title %}Finwizz{% endblock %}</title>
    <link href="{{ MEDIA_BLOG_URL }}css/navbar.css" rel="stylesheet" type="text/css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link href="{{ MEDIA_BLOG_URL }}css/common.css" rel="stylesheet" type="text/css" />
    <link href="{{ MEDIA_BLOG_URL }}css/footer.css" rel="stylesheet" type="text/css" />
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'includes/navbar.html' %}

    <main id="main-content">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="{{ MEDIA_BLOG_URL }}js/navbar.js"></script>
    
    {% block extra_js %}{% endblock %}

</body>
</html>
